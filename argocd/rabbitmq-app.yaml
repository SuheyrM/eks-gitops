apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rabbitmq
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: rabbitmq
    targetRevision: 16.0.14
    helm:
      releaseName: rabbitmq
      values: |
        auth:
          username: admin
          password: admin123
        image:
          registry: docker.io
          repository: bitnami/rabbitmq
          tag: latest
        metrics:
          enabled: true
          serviceMonitor:
            enabled: true
            namespace: monitoring
        service:
          type: ClusterIP
        persistence:
          enabled: true
          storageClass: gp3-monitoring
          size: 8Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: rabbitmq
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
